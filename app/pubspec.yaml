name: app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  # Supabase for backend services
  supabase_flutter: ^2.0.0
  flutter_dotenv: ^5.1.0  # For .env file support
  
  # Keep Firebase for analytics and crashlytics only
  firebase_analytics: ^10.10.0
  firebase_crashlytics: ^3.5.0
  
  flutter:
    sdk: flutter
  google_generative_ai: ^0.4.0  # Direct Gemini SDK
  google_sign_in: ^6.2.1
  google_fonts: ^6.2.1
  http: ^1.2.0
  image_picker: ^1.0.7
  provider: ^6.1.5+1
  shared_preferences: ^2.2.3
  uuid: ^4.4.0

  # UI & Animation
  fl_chart: ^0.70.0              # Charts for analytics
  shimmer: ^3.0.0                # Loading skeletons
  flutter_animate: ^4.5.0       # Micro-animations
  cached_network_image: ^3.4.1  # Image caching
  intl: ^0.19.0                 # Date formatting

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
